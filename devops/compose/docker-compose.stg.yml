services:
  db:
    image: postgres:16
    env_file:
      - ../../.env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PWD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $DB_NAME -U $DB_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../../
      dockerfile: devops/docker/Dockerfile
    volumes:
      - ../../:/app
    env_file:
      - ../../.env
    ports:
      - "${API_PORT}:${API_PORT}"

volumes:
  postgres_data:
  redis_data: